# ChainProof Angular SPA + Go API (aaPanel extension)
# Install: copy to /www/server/panel/vhost/nginx/extension/chainproof.rejoda.co.tz/chainproof-app.conf
# Then: nginx -t && nginx -s reload

location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location /health {
    proxy_pass http://127.0.0.1:8080/health;
    proxy_set_header Host $host;
}

# ^~ stops aaPanel's generic js/css regex from hijacking Angular hashed assets
location ^~ / {
    root /www/wwwroot/chainproof.rejoda.co.tz/frontend/dist/frontend/browser;
    try_files $uri $uri/ /index.html;
    index index.html;
}
